<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>MediShare — Donate Unused Medicines, Help Communities</title>
    <meta name="description" content="MediShare connects medicine donors with verified NGOs. Donate unused, unexpired medicines securely and help underprivileged communities access essential healthcare." />
    <meta name="keywords" content="medicine donation, donate medicines, NGO healthcare, medical aid, unused medicines" />
    <meta name="author" content="MediShare Health Systems" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://medishare.org/" />
    <meta property="og:title"       content="MediShare — Turn Surplus Medicines Into Hope" />
    <meta property="og:description" content="A transparent platform connecting medicine donors with verified NGOs. Reduce medical waste and save lives." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MediShare — Turn Surplus Medicines Into Hope" />
    <meta name="twitter:description" content="Donate unused medicines to verified NGOs. Transparent, safe, impactful." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts — preconnect first for perf, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#091426" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
